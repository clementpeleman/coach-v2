<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Floating Coach</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* warm off-white canvas */
    --bg:          oklch(96% 0.010 90);
    --bg-soft:     oklch(92% 0.014 90);
    --surface:     oklch(99% 0.006 95);
    --surface-strong: oklch(100% 0.004 95);
    --ink:         oklch(16% 0.008 115);
    --ink-2:       oklch(26% 0.010 105);
    --ink-3:       oklch(45% 0.010 100);
    --ink-4:       oklch(62% 0.010 100);
    --line:        oklch(89% 0.006 100);
    --line-strong: oklch(80% 0.008 100);
    --dark:        oklch(16% 0.008 115);
    --dark-2:      oklch(22% 0.009 105);
    --dark-3:      oklch(28% 0.010 105);
    --text-on-dark: oklch(97% 0.008 95);

    --accent:      oklch(85% 0.19 125);     /* default acid lime */
    --accent-ink:  var(--ink);
    --accent-soft: color-mix(in oklab, var(--accent) 22%, transparent);

    --warn:        oklch(78% 0.16 60);      /* warm amber */
    --bad:         oklch(67% 0.20 25);      /* coral */
    --good:        oklch(75% 0.16 155);     /* mint */

    --r-sm: 8px;
    --r:    14px;
    --r-lg: 22px;
    --r-xl: 28px;

    --shadow-sm: 0 1px 0 rgba(13,14,11,.04), 0 2px 6px rgba(13,14,11,.04);
    --shadow:    0 1px 0 rgba(13,14,11,.05), 0 18px 40px -16px rgba(13,14,11,.18);
    --shadow-orb:0 14px 40px -8px rgba(13,14,11,.55), 0 2px 0 rgba(255,255,255,.06) inset;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-feature-settings: 'ss01', 'ss02', 'cv11';
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  button, input, textarea, select { font: inherit; }
  button { min-height: 44px; }
  input:not([type="range"]), textarea, select { min-height: 44px; }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: 'tnum'; }

  /* App layout */
  .app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 232px 1fr;
  }
  .rail {
    border-right: 1px solid var(--line);
    background: var(--bg);
    padding: 22px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .rail .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 10px 24px;
  }
  .rail .brand .dot {
    width: 22px; height: 22px; border-radius: 999px;
    background: var(--ink); position: relative;
  }
  .rail .brand .dot::after {
    content: ''; position: absolute; inset: 4px;
    border-radius: 999px; background: var(--accent);
    animation: breathe 3.2s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.78); opacity: .65; } }
  .rail .brand b {
    font-weight: 700; letter-spacing: -.01em; font-size: 16px;
  }
  .rail .brand small {
    display: block; font-size: 10px; letter-spacing: .14em;
    color: var(--ink-4); text-transform: uppercase; margin-top: 1px;
    font-family: 'JetBrains Mono', monospace;
  }
  .rail-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--r-sm);
    color: var(--ink-2); cursor: pointer;
    font-size: 14px; font-weight: 500;
    transition: background .15s, color .15s;
    min-height: 44px;
  }
  button.rail-item {
    width: 100%;
    border: 0;
    background: transparent;
    text-align: left;
    font-family: inherit;
  }
  .rail-item .ico {
    width: 22px; display: inline-flex; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--ink-4);
  }
  .rail-item:hover { background: var(--bg-soft); }
  .rail-item.active {
    background: var(--ink); color: var(--text-on-dark);
  }
  .rail-item.active .ico { color: var(--accent); }
  .rail .spacer { flex: 1; }
  .rail .footer {
    border-top: 1px solid var(--line);
    padding: 14px 10px 4px;
    display: flex; gap: 10px; align-items: center;
  }
  .rail .footer .avatar {
    width: 32px; height: 32px; border-radius: 999px;
    background: var(--ink); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    font-family: 'JetBrains Mono', monospace;
  }
  .rail .footer .who { font-size: 13px; font-weight: 600; }
  .rail .footer .stat { font-size: 10px; color: var(--ink-4); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .12em; }

  .main {
    padding: 32px 40px 120px;
    max-width: 1180px;
    width: 100%;
  }

  /* Top bar of each screen */
  .screen-head {
    display: flex; align-items: end; justify-content: space-between;
    gap: 20px; margin-bottom: 28px;
  }
  .screen-head h1 {
    font-size: 44px; font-weight: 600; letter-spacing: -.025em;
    margin: 0; line-height: 1;
  }
  .screen-head h1 em {
    font-style: normal; color: var(--ink-4);
    font-weight: 500;
  }
  .screen-head .meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-4); text-transform: uppercase; letter-spacing: .14em;
    text-align: right;
  }
  .screen-head .meta b { color: var(--ink); font-weight: 500; }

  /* Card primitives */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 22px;
  }
  .card.dark {
    background: var(--dark);
    color: var(--text-on-dark);
    border-color: transparent;
  }
  .card.tight { padding: 16px; }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .16em;
    color: var(--ink-4); text-transform: uppercase;
  }
  .dark .label { color: oklch(70% 0.01 100); }

  /* Big numeric */
  .stat-big {
    font-size: 56px; font-weight: 500; letter-spacing: -.03em;
    line-height: 1; font-family: inherit;
    font-variant-numeric: tabular-nums;
  }
  .stat-unit {
    font-size: 14px; color: var(--ink-3); margin-left: 4px;
    font-weight: 500;
  }
  .dark .stat-unit { color: oklch(70% 0.01 100); }

  /* Generic buttons */
  .btn {
    border: 1px solid var(--ink); background: var(--ink); color: var(--text-on-dark);
    font: 600 13px/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 12px 18px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    justify-content: center;
    letter-spacing: -.005em;
    min-height: 44px;
    transition: transform .12s, background .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--bg-soft); }
  .btn.accent { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .btn.lg { padding: 16px 22px; font-size: 14px; }
  .btn.xl { padding: 20px 26px; font-size: 16px; border-radius: 999px; }
  .btn .arrow { font-family: 'JetBrains Mono', monospace; font-weight: 500; }

  /* Pulse for live elements */
  @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.8); } }
  .live-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--bad); display: inline-block; animation: pulse-dot 1.4s ease-in-out infinite; }

  /* Tag */
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 999px;
    background: var(--bg-soft); color: var(--ink-2);
    font-size: 11px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace; letter-spacing: .04em;
  }
  button.tag { min-height: 44px; cursor: pointer; }
  .tag.accent { background: var(--accent); color: var(--accent-ink); }
  .tag.dark   { background: var(--ink); color: var(--text-on-dark); }

  /* Recovery ring */
  .ring-wrap { position: relative; width: 152px; height: 152px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { stroke: oklch(92% 0.005 100); fill: none; stroke-width: 10; }
  .dark .ring-bg { stroke: oklch(25% 0.005 100); }
  .ring-fg { stroke: var(--accent); fill: none; stroke-width: 10; stroke-linecap: round;
             transition: stroke-dashoffset .6s ease; }
  .ring-fg.warn { stroke: var(--warn); }
  .ring-fg.bad  { stroke: var(--bad); }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
  }
  .ring-num { font-size: 44px; font-weight: 500; letter-spacing: -.03em; line-height: 1; }
  .ring-num em { font-style: normal; color: var(--ink-4); font-size: 18px; font-weight: 500; }
  .ring-lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px;
              text-transform: uppercase; letter-spacing: .14em; color: var(--ink-4); }
  .dark .ring-lbl { color: oklch(70% 0.01 100); }

  /* Tables */
  table.fc {
    width: 100%; border-collapse: collapse;
  }
  table.fc th, table.fc td {
    text-align: left; padding: 14px 12px;
    font-size: 13px; border-bottom: 1px solid var(--line);
  }
  table.fc th {
    font-weight: 500; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-4); border-bottom-color: var(--line-strong);
  }
  table.fc tr:last-child td { border-bottom: none; }
  table.fc tr.hover:hover td { background: var(--bg-soft); cursor: pointer; }
  table.fc tr[role="button"]:focus-visible td {
    background: var(--bg-soft);
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  /* Focus styles */
  button:focus-visible, input:focus-visible, .rail-item:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px;
  }
  input[type="range"] { height: 44px; min-height: 44px; }
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* Forms */
  .field {
    display: flex; flex-direction: column; gap: 6px;
  }
  .field label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: .14em; color: var(--ink-4);
  }
  .field input {
    border: 1px solid var(--line-strong); border-radius: var(--r-sm);
    padding: 14px 14px; font: 500 15px/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--surface); color: var(--ink);
  }
  .field input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }

  /* Floating coach orb */
  .orb-wrap {
    position: fixed; right: 28px; bottom: 28px; z-index: 60;
    display: flex; flex-direction: column; align-items: end; gap: 12px;
  }
  .orb {
    background: var(--dark); color: var(--text-on-dark);
    border-radius: 999px;
    box-shadow: var(--shadow-orb);
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px 10px 12px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,.05);
    transition: transform .2s ease;
    user-select: none;
  }
  .orb:hover { transform: translateY(-2px); }
  .orb .face {
    width: 38px; height: 38px; border-radius: 999px;
    background: linear-gradient(150deg, var(--accent), color-mix(in oklab, var(--accent) 60%, var(--ink)));
    position: relative; flex-shrink: 0;
  }
  .orb .face::before, .orb .face::after {
    content: ''; position: absolute; background: var(--ink);
    width: 5px; height: 5px; border-radius: 999px;
    top: 14px;
  }
  .orb .face::before { left: 11px; }
  .orb .face::after  { right: 11px; }
  .orb .face .mouth {
    position: absolute; left: 12px; right: 12px; bottom: 10px; height: 3px;
    border-radius: 0 0 6px 6px; background: var(--ink);
  }
  .orb .face .halo {
    position: absolute; inset: -4px; border-radius: 999px;
    border: 1.5px solid var(--accent); opacity: .5;
    animation: halo 2.2s ease-out infinite;
  }
  @keyframes halo {
    0%   { transform: scale(.9); opacity: .8; }
    100% { transform: scale(1.45); opacity: 0; }
  }
  .orb .meta { display: flex; flex-direction: column; gap: 2px; }
  .orb .name { font-size: 13px; font-weight: 600; letter-spacing: -.01em; }
  .orb .sub  { font-size: 10px; font-family: 'JetBrains Mono', monospace;
               text-transform: uppercase; letter-spacing: .14em; color: oklch(72% 0.01 100); }

  /* Coach panel (expanded chat) */
  .coach-panel {
    width: min(380px, calc(100vw - 24px)); max-height: min(640px, calc(100vh - 96px));
    background: var(--surface);
    border-radius: var(--r-xl);
    border: 1px solid var(--line);
    box-shadow: 0 20px 60px -10px rgba(13,14,11,.35);
    display: flex; flex-direction: column;
    overflow: hidden;
    transform-origin: bottom right;
    animation: pop .2s ease-out;
  }
  @keyframes pop { 0% { transform: scale(.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes thinking-pulse { 0%,100% { transform: scale(.84); opacity: .45; } 50% { transform: scale(1); opacity: 1; } }

  /* HR pulse line */
  .hr-line { width: 100%; height: 56px; }
  .hr-line path { fill: none; stroke: var(--accent); stroke-width: 2; }
  .dark .hr-line path { stroke: var(--accent); }

  /* Bar chart */
  .bar { background: var(--ink); border-radius: 4px 4px 0 0; transition: opacity .2s ease; }
  .bar.accent { background: var(--accent); }

  /* Hide scrollbar in panels */
  .scroll { overflow-y: auto; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: oklch(85% 0.005 100); border-radius: 6px; }

  /* Utility */
  .row { display: flex; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .between { justify-content: space-between; }
  .center  { align-items: center; }
  .gap-sm  { gap: 8px; }
  .gap-md  { gap: 14px; }
  .gap-lg  { gap: 24px; }
  .flex1   { flex: 1; }

  /* Section header */
  h2 {
    font-size: 20px; font-weight: 600; letter-spacing: -.015em;
    margin: 0;
  }
  h3 { font-size: 16px; font-weight: 600; letter-spacing: -.01em; margin: 0; }

  /* Onboarding splash */
  .splash {
    min-height: 100vh; display: grid; place-items: center;
    background:
      radial-gradient(700px 500px at 18% 28%, color-mix(in oklab, var(--accent) 22%, transparent), transparent 70%),
      radial-gradient(900px 600px at 80% 80%, color-mix(in oklab, var(--accent) 14%, transparent), transparent 70%),
      var(--bg);
    padding: 60px 40px;
  }

  /* Mobile bottom tab bar */
  @media (max-width: 767px) {
    .app {
      grid-template-columns: 1fr;
      min-height: 100dvh;
      padding-bottom: 72px;
    }
    .rail {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      top: auto;
      height: auto;
      min-height: 0;
      flex-direction: row;
      align-items: stretch;
      justify-content: space-around;
      border-right: none;
      border-top: 1px solid var(--line);
      border-bottom: 0;
      padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
      z-index: 55;
      gap: 2px;
      background: var(--surface);
    }
    .rail-brand,
    .rail-status,
    .rail-extra,
    .rail-footer,
    .rail .spacer {
      display: none !important;
    }
    .rail-item.tab-nav {
      flex: 1;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 8px 4px;
      font-size: 11px;
      text-align: center;
      width: auto;
      white-space: nowrap;
    }
    .rail-item.tab-nav .ico { font-size: 16px; }
    .main {
      width: 100%;
      padding: 20px 16px 100px;
      max-width: none;
      overflow: hidden;
    }
    .screen-head {
      display: block;
      margin-bottom: 20px;
    }
    .screen-head h1 {
      font-size: 32px;
      line-height: .98;
    }
    .screen-head .meta {
      margin-top: 16px;
      text-align: left;
    }
    .grid-2, .grid-3, .grid-4,
    .main [style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
    }
    .main [style*="width: 400"] { width: 100% !important; }
    .card {
      border-radius: 18px;
      padding: 18px;
    }
    table.fc {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table.fc thead,
    table.fc tbody {
      display: table;
      min-width: 680px;
      width: 100%;
    }
    .orb-wrap {
      left: 12px;
      right: 12px;
      bottom: 72px;
      align-items: stretch;
    }
    .orb {
      align-self: flex-end;
      max-width: calc(100vw - 24px);
    }
    .coach-panel {
      width: 100%;
      max-height: calc(100vh - 150px);
    }
    .splash { padding: 32px 20px; }
  }

  @media (max-width: 520px) {
    .orb .meta { display: none; }
    .stat-big { font-size: 46px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="src/app.bundle.js" defer></script>

</body>
</html>
