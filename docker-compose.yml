services:
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: coach_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # No host port binding by default (Coolify/proxy uses internal network).
    # For local dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
    expose:
      - "5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g

  app:
    build: .
    container_name: coach_app
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ""
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      # API does not use Telegram — clear placeholders from shared .env
      TELEGRAM_BOT_TOKEN: ""
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
      GARMIN_REDIRECT_URI: ${GARMIN_REDIRECT_URI:-}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://coach.peleman.io}
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy

  # Floating Coach UI (static) — default public frontend
  frontend:
    build:
      context: "./Floating Coach"
      dockerfile: Dockerfile
    container_name: coach_frontend
    expose:
      - "80"
    depends_on:
      - app

  # Legacy Next.js app (optional): docker compose --profile nextjs up -d
  webapp:
    profiles: ["nextjs"]
    build:
      context: ./webapp
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://coach.peleman.io}
    container_name: coach_webapp
    expose:
      - "3000"
    depends_on:
      - app

  # Public entrypoint: webapp + API on one domain (point Coolify domain here, port 80)
  gateway:
    build:
      context: ./deploy/gateway
      dockerfile: Dockerfile
    container_name: coach_gateway
    expose:
      - "80"
    depends_on:
      - app
      - frontend

  # Optional: docker compose --profile telegram up -d
  bot:
    profiles: ["telegram"]
    build: .
    container_name: coach_bot
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ""
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      API_URL: http://app:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - .:/app
    command: python chat_interface/telegram_bot.py
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
